
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Recherche États Financiers</title>
</head>
<body>
    <h1>Recherche Bilan ou PP</h1>
    <form action="{{ url_for('pp_bilan_result') }}" method="POST">
        <label>Période de :</label>
        <input type="month" name="periode_de" required>
        <label>à</label>
        <input type="month" name="periode_a" required><br><br>
        <label>Type d'état :</label>
        <select name="type">
            <option value="Bilan">Bilan</option>
            <option value="PP">Compte de Résultat (PP)</option>
        </select><br><br>
        <br><br>
        <br><br>
        

        <button type="submit">Rechercher</button>


    <div style="float: right; text-align: left;">
        <label><input type="checkbox" name="filtre1"> Exclure les comptes sans mouvement</label><br>
        <label><input type="checkbox" name="filtre2"> Exclure les comptes avec solde 0</label><br>
        <label><input type="checkbox" name="filtre3"> Inclure tous les comptes</label><br>
        <label><input type="checkbox" name="filtre4"> Total annuel P&P</label>
    </div>

        <br><br><br><br>

    </form>
</body>
</html>
