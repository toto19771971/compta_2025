<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Administration</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0; padding: 0;
      background-color: #f4f4f4;
      display: flex; justify-content: center; align-items: center;
      height: 100vh;
    }
    .container {
      text-align: center;
      background-color: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h1 {
      font-size: 24px;
      margin-bottom: 20px;
      color: #333;
    }
    .button-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .custom-button {
      display: flex; align-items: center; justify-content: center;
      background-color: #f5f5f5; color: #333;
      padding: 25px 60px; border-radius: 10px;
      text-decoration: none; font-size: 20px;
      border: 3px solid #007bff;
      transition: background-color 0.3s, border-color 0.3s;
    }
    .custom-button:hover {
      background-color: #e0e0e0;
      border-color: #0056b3;
    }
  </style>
</head>
<body>

<script>
  const pwd = prompt("Accès Administration – mot de passe :");
  if (pwd !== "abcd") {
    alert("Mot de passe incorrect");
    window.location.href = "{{ url_for('index') }}";
  }
</script>

<div class="container">
  <h1>Administration</h1>
  <div class="button-container">
    <a href="{{ url_for('bd_plan_comptable') }}"       class="custom-button">Plan comptable</a>
    <a href="{{ url_for('bd_fournisseurs') }}"          class="custom-button">Fournisseurs</a>
    <a href="{{ url_for('bd_factures_fournisseurs') }}" class="custom-button">Factures fournisseurs</a>
    <a href="{{ url_for('bd_grand_livre') }}"                 class="custom-button">Grand livre</a>
    <a href="{{ url_for('bd_clients') }}"                  class="custom-button">Clients</a>
    <a href="{{ url_for('bd_tva') }}"                      class="custom-button">TVA</a>
    <a href="{{ url_for('bd_delai_paiement') }}"           class="custom-button">Délai paiement</a>
    <a href="{{ url_for('bd_factures_clients') }}"         class="custom-button">Factures clients</a>
  </div>
</div>

</body>
</html>
